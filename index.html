


<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Portfolio - Hải Yến</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;

            /* nền giả lập giống ảnh */
            background: linear-gradient(120deg, #02040a, #0a1a2f, #000000);
            overflow: hidden;
        }

        /* hiệu ứng mờ giống ảnh */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.08), transparent 40%),
                        radial-gradient(circle at 70% 60%, rgba(255,255,255,0.05), transparent 50%);
            animation: move 15s infinite linear;
        }

        @keyframes move {
            0% { transform: translate(0,0); }
            50% { transform: translate(-10%, -10%); }
            100% { transform: translate(0,0); }
        }

        .overlay {
            position: relative;
            background: rgba(0, 0, 0, 0.4);
            padding: 40px 60px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            text-align: center;
        }

        h1 {
            font-size: 50px;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        p {
            font-size: 18px;
            opacity: 0.85;
            margin: 10px 0;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 25px;
            border: 1px solid white;
            border-radius: 30px;
            color: white;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn:hover {
            background: white;
            color: black;
        }
    </style>
</head>

<body>
    <div class="overlay">
        <h1>Hải Yến</h1>
        <p>Xin chào! Mình là Hải Yến.</p>
        </p>Mình là sinh viên với niềm đam mê học hỏi, sáng tạo và khám phá những điều mới mẻ.</p>
        <p>Mình quan tâm đến việc xây dựng sản phẩm đơn giản, hiệu quả và có tính ứng dụng thực tế.</p>

        <a href="mailto:k63.2411330062@ftu.edu.vn" class="btn">
            Liên hệ với mình
        </a>
    </div>
</body>
</html>
